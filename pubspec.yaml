name: flutter_survey_js
description: "A Flutter package that renders SurveyJS JSON as native Flutter widgets. Supports 15+ question types, themes, validation, multi-page, and conditional logic. Pure Dart — no JavaScript bridge required."
version: 0.1.0
homepage: https://github.com/ahmedsabry10/flutter_survy_js_new
repository: https://github.com/ahmedsabry10/flutter_survy_js_new
issue_tracker: https://github.com/ahmedsabry10/flutter_survy_js_new/issues

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  # Pure Dart package — no assets needed